  width="1200"
  height="630"
  viewBox="0 0 1200 630"
  fill="none"
>
  <defs>
    <linearGradient
      id="sky"
      x1="600"
      y1="0"
      x2="600"
      y2="630"
      gradientUnits="userSpaceOnUse"
    >
      <stop stop-color="#e8f0fe" />
      <stop offset="0.25" stop-color="#c9d8f5" />
      <stop offset="0.5" stop-color="#a8c4f0" />
      <stop offset="0.75" stop-color="#c0d4f5" />
      <stop offset="1" stop-color="#ebe4f5" />
    </linearGradient>
    <radialGradient
      id="sun"
      cx="0"
      cy="0"
      r="1"
      gradientUnits="userSpaceOnUse"
      gradientTransform="translate(620 120) rotate(90) scale(520 340)"
    >
      <stop stop-color="#fff6d8" stop-opacity="0.95" />
      <stop offset="0.35" stop-color="#ffe8b8" stop-opacity="0.55" />
      <stop offset="0.7" stop-color="#ffd8a0" stop-opacity="0.18" />
      <stop offset="1" stop-color="#ffd8a0" stop-opacity="0" />
    </radialGradient>
    <linearGradient
      id="cloudStroke"
      x1="0"
      y1="0"
      x2="0"
      y2="1"
      gradientUnits="objectBoundingBox"
    >
      <stop stop-color="#D0FCFF" />
      <stop offset="0.78" stop-color="#E9FEFF" stop-opacity="0.55" />
      <stop offset="1" stop-color="#E9FEFF" stop-opacity="0.42" />
    </linearGradient>
    <filter
      id="cloudBlur"
      x="-20%"
      y="-20%"
      width="140%"
      height="140%"
      color-interpolation-filters="sRGB"
    >
      <feGaussianBlur stdDeviation="12" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#sky)" />
  <rect width="1200" height="630" fill="url(#sun)" />

