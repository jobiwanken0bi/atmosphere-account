      id="blur"
      x="-20%"
      y="-20%"
      width="140%"
      height="140%"
      color-interpolation-filters="sRGB"
    >
      <feGaussianBlur stdDeviation="10" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter
      id="shadow"
      x="-20%"
      y="-20%"
      width="140%"
      height="140%"
      color-interpolation-filters="sRGB"
    >
      <feDropShadow
        dx="0"
        dy="18"
        stdDeviation="22"
        flood-color="#0e1428"
        flood-opacity="0.12"
      />
    </filter>
  </defs>

