# Fly.io config for the Atmosphere registry indexer worker.
#
# Provision once:
#   fly launch --no-deploy --copy-config --name atmosphere-registry-indexer \
#       --region iad --dockerfile worker/Dockerfile
#   fly secrets set TURSO_DATABASE_URL=... TURSO_AUTH_TOKEN=... \
#                   ATMOSPHERE_DID=did:plc:...
#   fly deploy
#
# This worker only needs ~256MB RAM and one persistent process; no public ports.

app = "atmosphere-registry-indexer"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[processes]
  worker = "deno run -A worker/indexer.ts"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[deploy]
  strategy = "immediate"
