# Fly.io config for the Atmosphere registry indexer worker.
#
# Background-only worker: holds a long-lived outbound WebSocket to
# Bluesky's Jetstream, fans events into the Turso registry DB, persists
# its cursor. No public ports, no HTTP listener — that's intentional,
# and is why there's no [http_service] block here (flyctl launch's
# default template assumes a webserver).
#
# Deploy from the project root:
#   flyctl deploy --config fly.indexer.toml --dockerfile worker.Dockerfile
# Logs:
#   flyctl logs --config fly.indexer.toml
# Status:
#   flyctl status --config fly.indexer.toml

app = 'atmosphere-registry-indexer'
primary_region = 'iad'
kill_signal = 'SIGTERM'
kill_timeout = 30

[build]
  dockerfile = 'worker.Dockerfile'

[deploy]
  strategy = 'rolling'
  release_command = 'deno run -A --node-modules-dir=auto scripts/migrate-db.ts'

# Single always-on background process.
[processes]
  worker = 'deno run -A --node-modules-dir=auto worker/indexer.ts'

[[restart]]
  policy = 'always'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  processes = ['worker']
