name: Production Smoke

on:
  workflow_dispatch:
    inputs:
      expected_release_sha:
        description: "Optional override; defaults to the checked-out SHA that production shell and appview must report"
        required: false
        type: string
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: production-smoke
  cancel-in-progress: true

jobs:
  smoke:
    name: Production smoke suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.12

      - name: Smoke production
        env:
          SMOKE_EXPECT_RELEASE_SHA: ${{ github.event.inputs.expected_release_sha || github.sha }}
        run: deno task smoke:production

      - name: Open or update production alert
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          ALERT_TITLE: "Production smoke is failing"
        run: |
          issue_number="$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --search "\"$ALERT_TITLE\" in:title" \
            --json number,title \
            --jq ".[] | select(.title == \"$ALERT_TITLE\") | .number" \
            | head -n 1)"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [ -n "$issue_number" ]; then
            gh issue comment "$issue_number" \
              --repo "$GITHUB_REPOSITORY" \
              --body "The production smoke failed again: ${run_url}"
          else
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$ALERT_TITLE" \
              --body "The hourly production smoke failed. Investigate the Deno shell, Railway appview, indexer lease, Postgres readiness, and the 42-hour complete PDS-inventory heartbeat.\n\nRun: ${run_url}"
          fi

      - name: Close recovered production alert
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          ALERT_TITLE: "Production smoke is failing"
        run: |
          issue_number="$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --search "\"$ALERT_TITLE\" in:title" \
            --json number,title \
            --jq ".[] | select(.title == \"$ALERT_TITLE\") | .number" \
            | head -n 1)"
          if [ -n "$issue_number" ]; then
            run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            gh issue comment "$issue_number" \
              --repo "$GITHUB_REPOSITORY" \
              --body "Production recovered and the smoke suite is passing again: ${run_url}"
            gh issue close "$issue_number" --repo "$GITHUB_REPOSITORY"
          fi
